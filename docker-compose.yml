version: '3.8'

services:
  # Laravel App Service
  app:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    image: ai-notes-backend
    container_name: ai-notes-backend-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    networks:
      - ai-notes-network

  # Nginx Web Server
  webserver:
    image: nginx:alpine
    container_name: ai-notes-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ai-notes-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: ai-notes-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ai_notes_app
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ai-notes-network

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: ai-notes-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - ai-notes-network

  # Frontend Vite Service
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    image: ai-notes-frontend
    container_name: ai-notes-frontend-app
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - VITE_API_URL=/api
    depends_on:
      - app
    networks:
      - ai-notes-network

networks:
  ai-notes-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  redisdata:
    driver: local
